<text x="493.92499999999995" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">🚀 开始使用 YMOS</text>
<text x="493.925" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">Step 0: 说「开始使用」&lt;br&gt;AI 引导入职</text>
<text x="493.925" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">填写投资偏好&lt;br&gt;9 个维度访谈&lt;br&gt;写入投资偏好文件</text>
<text x="493.925" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">添加持仓&lt;br&gt;初始化持仓状态机</text>
<text x="493.92499999999995" y="362" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">添加 Watchlist&lt;br&gt;建立关注标的</text>
<text x="493.925" y="438" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">引导跑第一轮&lt;br&gt;体验完整闭环</text>
<text x="493.92499999999995" y="549.025" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">📅 每日运行</text>
<text x="163.25000000000003" y="695.0749999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">跑一下市场洞察&lt;br&gt;RSS + P13 分析 → 市场日报</text>
<text x="163.25000000000003" y="806.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">跑一下投资雷达&lt;br&gt;价格扫描 + 趋势 → 桥接报告</text>
<text x="163.25000000000003" y="882.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">跑一下策略分析&lt;br&gt;读取雷达建议 → 策略路由</text>
<text x="163.25000000000003" y="958.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">收口一下&lt;br&gt;校验 + 刷新持仓视图</text>
<text x="734.0375000000001" y="695.0749999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">🎯 按需触发</text>
<text x="419.4500000000001" y="806.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">调研一下 TSLA&lt;br&gt;P1+P4+P2+P9 深度调研</text>
<text x="643.4750000000001" y="806.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">我想买 TSLA&lt;br&gt;买入策略路由</text>
<text x="824.6000000000001" y="806.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">持有怎么看 NIO&lt;br&gt;持有评估</text>
<text x="998.575" y="806.0999999999999" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#1a1b26">关注/建仓/清仓&lt;br&gt;标的管理</text>
